/* ───────────────────────── Utility: reveal & count-up ─────────────────────── */
function Reveal({ children, as: Tag = "div", delay = 0, className = "" }) {
  const ref = useRef(null);
  const [show, setShow] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setShow(true); io.disconnect(); }
    }, { threshold: 0.15 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <Tag ref={ref} style={{ transitionDelay: `${delay}ms` }}
      className={`reveal ${show ? "in" : ""} ${className}`}>{children}</Tag>
  );
}

const nf = new Intl.NumberFormat("it-IT");
function useCountUp(target, run, dur = 1700) {
  const [v, setV] = useState(0);
  useEffect(() => {
    if (!run) return;
    let raf;
    const t0 = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - t0) / dur);
      const eased = 1 - Math.pow(1 - t, 3);
      setV(target * eased);
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [run, target, dur]);
  return v;
}

  );
}

function StatsBand() {

/* ───────────────────────── Footer ─────────────────────────────────────────── */
function Newsletter() {
  const [email, setEmail] = useState("");
  const [done, setDone] = useState(false);
  const submit = (e) => {
    e.preventDefault();
    if (/.+@.+\..+/.test(email)) setDone(true);
  };
  return (
    <form onSubmit={submit} className="mt-5" noValidate>
      <label htmlFor="nl-email" className="text-sm font-medium text-cream">
        Iscriviti alla newsletter
      </label>
      <p className="mt-1 text-sm text-slate-400">Open day, scadenze e storie dal campus.</p>
      {done ? (
        <p role="status" className="mt-3 rounded-xl border border-emerald-400/30 bg-emerald-400/10 px-4 py-3 text-sm text-emerald-200">
          Grazie! Controlla la tua casella per confermare l'iscrizione.
        </p>
      ) : (
        <div className="mt-3 flex gap-2">
          <input id="nl-email" type="email" required value={email}
            onChange={(e) => setEmail(e.target.value)} placeholder="nome@email.it"
            className="h-11 w-full rounded-full border border-white/15 bg-white/5 px-4 text-sm text-cream placeholder:text-slate-500 focus:border-gold/50" />
          <button type="submit" aria-label="Iscriviti"
            className="inline-flex h-11 shrink-0 items-center gap-2 rounded-full bg-gradient-to-br from-goldlight to-gold px-5 text-sm font-semibold text-ink transition hover:brightness-105 active:scale-95">
            <ISend className="h-4 w-4" /> <span className="hidden sm:inline">Iscriviti</span>
          </button>
        </div>
      )}
    </form>
  );
}
