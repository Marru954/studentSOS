<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Student OS — preview clean v2</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<script>
  tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', "system-ui", "sans-serif"] } } } };

<style>
  /* ── tema chiaro (default) e dark "calmo" via variabili ── */
  :root {
    --bg:#F9FAFB; --card:#FFFFFF; --border:#ECEEF1; --border-strong:#DDE0E5;
    --text:#111827; --muted:#6B7280; --faint:#9CA3AF; --line:#F0F1F3; --hover:#F4F5F7;
    --accent:#5A6B9E; --accent-soft: rgba(90,107,158,.12);
    --shadow: 0 1px 2px rgba(16,24,40,.04); --shadow-hover: 0 6px 20px -10px rgba(16,24,40,.12);
  }
  html.dark {
    --bg:#0E0F12; --card:#17191F; --border:#23262E; --border-strong:#30343E;
    --text:#ECEDEF; --muted:#9AA0AC; --faint:#6B7280; --line:#23262E; --hover:#1E2128;
    --accent:#8A9BD4; --accent-soft: rgba(138,155,212,.16);
    --shadow: none; --shadow-hover: 0 10px 26px -10px rgba(0,0,0,.55);
  }

  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); transition: background .25s ease, color .25s ease; }
  ::selection { background: var(--accent); color: #fff; }
  .tnum { font-variant-numeric: tabular-nums; }

  .bg-app{background:var(--bg)} .surface{background:var(--card)}
  .text-app{color:var(--text)} .text-muted{color:var(--muted)} .text-faint{color:var(--faint)}
  .accent{color:var(--accent)} .bg-accent{background:var(--accent)} .bg-accentsoft{background:var(--accent-soft)}
  .bg-line{background:var(--line)} .border-soft{border-color:var(--border)} .border-strong{border-color:var(--border-strong)}
  .hoverable{transition:background .15s ease} .hoverable:hover{background:var(--hover)}
  .btn-primary{background:var(--text);color:var(--bg);transition:opacity .15s ease} .btn-primary:hover{opacity:.86}
  .label{font-size:.72rem;color:var(--faint);font-weight:500}
  .divide-soft>*+*{border-top:1px solid var(--line)}

  .card{ background:var(--card); border:1px solid var(--border); box-shadow:var(--shadow);
    transition: box-shadow .2s ease, border-color .2s ease, transform .2s ease, opacity .15s ease; }
  .card:hover{ border-color:var(--border-strong); box-shadow:var(--shadow-hover); transform:translateY(-2px); }
  .card.over{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .card.dragging{ opacity:.45; }

  .grip{ color:var(--faint); opacity:0; transition:opacity .15s ease, color .15s ease; cursor:grab; }
  .card:hover .grip, .grip:focus-visible{ opacity:1; }
  .grip:hover{ color:var(--muted); }

  input::placeholder{ color:var(--faint); }
  *:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:6px; }

  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto} .card:hover{transform:none}
  }
</style>
</head>

<body class="font-sans antialiased">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ───────── icone ───────── */
const Svg = ({ children, className = "w-4 h-4", sw = 1.7, ...p }) => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw}
    strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true" {...p}>{children}</svg>
);
const ICap = (p) => <Svg {...p}><path d="M22 9 12 5 2 9l10 4 10-4z"/><path d="M6 11v5c0 1.5 3 3 6 3s6-1.5 6-3v-5"/></Svg>;
const IArrowUR = (p) => <Svg {...p}><path d="M7 17 17 7"/><path d="M8 7h9v9"/></Svg>;
const IArrow = (p) => <Svg {...p}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Svg>;
const ILayers = (p) => <Svg {...p}><path d="m12 2 9 5-9 5-9-5z"/><path d="m3 12 9 5 9-5"/><path d="m3 17 9 5 9-5"/></Svg>;
const ISend = (p) => <Svg {...p}><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></Svg>;
const IPlay = (p) => <Svg {...p}><path d="M6 4l14 8-14 8z" fill="currentColor" stroke="none"/></Svg>;
const IPause = (p) => <Svg {...p}><rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor" stroke="none"/><rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor" stroke="none"/></Svg>;
const IReset = (p) => <Svg {...p}><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></Svg>;
const ISun = (p) => <Svg {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5 3.5 3.5M20.5 20.5 19 19M19 5l1.5-1.5M3.5 20.5 5 19"/></Svg>;
const IMoon = (p) => <Svg {...p}><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></Svg>;
const IGrip = (p) => <Svg {...p}><circle cx="9" cy="6" r="1.3" fill="currentColor" stroke="none"/><circle cx="15" cy="6" r="1.3" fill="currentColor" stroke="none"/><circle cx="9" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="9" cy="18" r="1.3" fill="currentColor" stroke="none"/><circle cx="15" cy="18" r="1.3" fill="currentColor" stroke="none"/></Svg>;

const useCountUp = (target, dur = 1300, dec = 0) => {
  const [v, setV] = useState(0);
  useEffect(() => {
    let raf; const t0 = performance.now();
    const tick = (n) => { const t = Math.min(1, (n - t0) / dur); setV(target * (1 - Math.pow(1 - t, 3))); if (t < 1) raf = requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick); return () => cancelAnimationFrame(raf);
  }, [target, dur]);
  return dec ? v.toFixed(dec) : Math.round(v);
};
const store = {
  get(k, f) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : f; } catch { return f; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

/* ───────── corpi delle tile ───────── */
function HeroBody() {
  return (
    <div className="flex h-full flex-col justify-between">
      <h1 className="text-4xl font-bold leading-[1.04] tracking-tight text-app sm:text-5xl">Student OS</h1>
      <div>
        <p className="mb-5 max-w-md text-[0.92rem] leading-relaxed text-muted">
          Orari, appelli, libretto, note e focus in un posto solo. Funziona con qualsiasi ateneo, sempre offline-first.
        </p>
        <div className="flex flex-wrap items-center gap-2.5">
          <a href="#" className="btn-primary flex items-center gap-2 rounded-lg px-4 py-2 text-sm font-medium">Apri l'app <IArrow className="h-4 w-4" /></a>
          <a href="#" className="surface hoverable flex items-center rounded-lg border border-soft px-4 py-2 text-sm font-medium text-app">Esplora i moduli</a>
        </div>
      </div>
    </div>
  );
}

function ClockBody() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);
  const p = (n) => String(n).padStart(2, "0");
  return (
    <div className="flex h-full flex-col justify-end">
      <p className="text-3xl font-semibold tracking-tight text-app tnum">{p(now.getHours())}:{p(now.getMinutes())}<span className="text-faint">:{p(now.getSeconds())}</span></p>
      <p className="mt-1 text-sm capitalize text-faint">{now.toLocaleDateString("it-IT", { weekday: "long", day: "2-digit", month: "long" })}</p>
    </div>
  );
}

function StatusBody() {
  const lines = [["sincronizzazione", "attiva"], ["cache", "pronta"], ["connessione", "online"]];
  return (
    <ul className="mt-auto space-y-2 text-sm">
      {lines.map(([k, v]) => (
        <li key={k} className="flex items-center justify-between">
          <span className="text-muted">{k}</span>
          <span className="flex items-center gap-1.5 font-medium text-app"><span className="h-1.5 w-1.5 rounded-full bg-emerald-500" />{v}</span>
        </li>
      ))}
    </ul>
  );
}

function MediaBody() {
  const media = useCountUp(28.4, 1300, 1), cfu = useCountUp(73, 1300);
  const r = 30, c = 2 * Math.PI * r, frac = 28.4 / 30;
  return (
    <div className="mt-2 flex items-center gap-6">
      <div className="relative h-[84px] w-[84px] shrink-0">
        <svg viewBox="0 0 80 80" className="h-full w-full -rotate-90">
          <circle cx="40" cy="40" r={r} fill="none" stroke="var(--line)" strokeWidth="7" />
          <circle cx="40" cy="40" r={r} fill="none" stroke="var(--accent)" strokeWidth="7" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - frac)} />
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <span className="text-2xl font-bold text-app tnum">{media}</span>
          <span className="text-[0.6rem] text-faint">media</span>
        </div>
      </div>
      <div className="flex-1">
        <div className="flex items-end justify-between"><span className="text-sm text-muted">CFU acquisiti</span><span className="text-sm font-semibold text-app tnum">132<span className="text-faint">/180</span></span></div>
        <div className="mt-2 h-2 w-full overflow-hidden rounded-full bg-line"><div className="h-full rounded-full bg-accent transition-[width] duration-1000" style={{ width: cfu + "%" }} /></div>
        <p className="mt-3 text-lg font-semibold text-app">110<span className="accent">L</span> <span className="text-sm font-normal text-faint">base proiettata</span></p>
      </div>
    </div>
  );
}

function CountdownBody() {
  return (
    <div className="flex h-full flex-col justify-between">
      <p className="mt-1 text-6xl font-bold leading-none text-app tnum">03</p>
      <div><p className="text-sm text-muted">giorni · Reti</p><p className="mt-0.5 text-xs text-faint">15.06 · 09:00 · Aula B2</p></div>
    </div>
  );
}

const FOCUS_TOTAL = 25 * 60;
function FocusBody() {
  const [left, setLeft] = useState(FOCUS_TOTAL);
  const [run, setRun] = useState(false);
  useEffect(() => {
    if (!run) return;
    const id = setInterval(() => setLeft((s) => { if (s <= 1) { return FOCUS_TOTAL; } return s - 1; }), 1000);
    return () => clearInterval(id);
  }, [run]);
  const r = 30, c = 2 * Math.PI * r, frac = (FOCUS_TOTAL - left) / FOCUS_TOTAL;
  const mm = String(Math.floor(left / 60)).padStart(2, "0"), ss = String(left % 60).padStart(2, "0");
  return (
    <div className="flex h-full flex-col items-center justify-center gap-3">
      <div className="relative h-[88px] w-[88px]">
        <svg viewBox="0 0 80 80" className="h-full w-full -rotate-90">
          <circle cx="40" cy="40" r={r} fill="none" stroke="var(--line)" strokeWidth="6" />
          <circle cx="40" cy="40" r={r} fill="none" stroke="var(--accent)" strokeWidth="6" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - frac)} style={{ transition: "stroke-dashoffset .9s linear" }} />
        </svg>
        <div className="absolute inset-0 flex items-center justify-center"><span className="text-xl font-semibold text-app tnum">{mm}:{ss}</span></div>
      </div>
      <div className="flex items-center gap-2">
        <button type="button" onClick={() => setRun((v) => !v)} aria-label={run ? "Pausa" : "Avvia"} className="btn-primary flex h-8 w-8 items-center justify-center rounded-lg">{run ? <IPause className="h-4 w-4" /> : <IPlay className="h-4 w-4" />}</button>
        <button type="button" onClick={() => { setRun(false); setLeft(FOCUS_TOTAL); }} aria-label="Reset" className="surface hoverable flex h-8 w-8 items-center justify-center rounded-lg border border-soft text-muted"><IReset className="h-4 w-4" /></button>
      </div>
    </div>
  );
}

function TimetableBody() {
  const rows = [["08:00", "Analisi II", "Aula A1", false], ["10:00", "Reti", "Aula B2", true], ["14:00", "Sistemi Operativi", "Lab 3", false], ["16:00", "Algoritmi", "Aula C4", false]];
  return (
    <>
      <p className="mb-1 text-xs text-faint">anni 1 · 2 · 3</p>
      <ul className="flex-1 divide-soft">
        {rows.map(([t, n, room, live]) => (
          <li key={n} className="flex items-center gap-4 py-2.5">
            <span className="w-12 text-sm text-faint tnum">{t}</span>
            <span className={"h-9 w-1 rounded-full " + (live ? "bg-accent" : "bg-line")} />
            <span className="flex-1"><span className="block text-sm font-medium text-app">{n}</span><span className="block text-xs text-faint">{room}</span></span>
            {live && <span className="bg-accentsoft accent rounded-md px-2 py-0.5 text-xs font-medium">in corso</span>}
          </li>
        ))}
      </ul>
    </>
  );
}

function replyFor(q) {
  const t = q.toLowerCase();
  if (/esam|studi|prepar|reti/.test(t)) return "Per quell'esame ti consiglio circa 6 ore al giorno da oggi: la probabilità di superare con 28+ sale all'82%. Vuoi che blocchi le sessioni nel calendario?";
  if (/orari|lezion/.test(t)) return "Oggi hai 4 lezioni. La prossima è Reti alle 10:00 in Aula B2.";
  if (/media|voto|libret|cfu/.test(t)) return "La tua media è 28.4 su 132 CFU. Per arrivare a 110L ti serve circa 28 di media sui CFU restanti.";
  return "Posso aiutarti con orario, appelli, libretto e piano di studio. Prova a chiedermi quando iniziare a studiare un esame.";
}
function AiBody() {
  const [msgs, setMsgs] = useState([{ role: "ai", text: "Ciao! Sono il tuo assistente. Come posso aiutarti oggi?" }]);
  const [q, setQ] = useState(""); const [typing, setTyping] = useState(false);
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ block: "nearest" }); }, [msgs, typing]);
  const send = (e) => {
    e.preventDefault();
    const text = q.trim(); if (!text) return;
    setMsgs((m) => [...m, { role: "user", text }]); setQ(""); setTyping(true);
    const a = replyFor(text);
    setTimeout(() => { setTyping(false); setMsgs((m) => [...m, { role: "ai", text: a }]); }, 650);
  };
  return (
    <div className="flex h-full flex-col">
      <div className="flex-1 space-y-2 overflow-y-auto pr-1" style={{ maxHeight: "120px" }}>
        {msgs.map((m, i) => (
          <p key={i} className={"text-sm leading-relaxed " + (m.role === "user" ? "text-muted" : "text-app")}>
            {m.role === "user" ? "» " : ""}{m.text}
          </p>
        ))}
        {typing && <p className="text-sm text-faint">sto scrivendo…</p>}
        <div ref={endRef} />
      </div>
      <form onSubmit={send} className="mt-3 flex items-center gap-2">
        <label htmlFor="ai-in" className="sr-only">Scrivi all'assistente</label>
        <input id="ai-in" value={q} onChange={(e) => setQ(e.target.value)} placeholder="Chiedi all'assistente…"
          className="surface flex-1 rounded-lg border border-soft px-3 py-2 text-sm text-app" />
        <button type="submit" aria-label="Invia" className="btn-primary flex h-9 w-9 items-center justify-center rounded-lg"><ISend className="h-4 w-4" /></button>
      </form>
    </div>
  );
}

function UniversalBody() {
  const tags = ["Esse3", "iCal / ICS", "EasyAcademy", "Delphi", "WordPress", "Scraper"];
  return (
    <div className="flex h-full flex-col justify-between">
      <div className="mt-2 flex flex-wrap gap-2">
        {tags.map((t) => <span key={t} className="surface flex items-center gap-1.5 rounded-md border border-soft px-2.5 py-1.5 text-xs font-medium text-muted"><ILayers className="h-3.5 w-3.5 text-faint" /> {t}</span>)}
      </div>
      <p className="mt-3 text-xl font-semibold text-app">1 OS · ∞ atenei</p>
    </div>
  );
}

function SparkBody() {
  const pts = [18, 14, 22, 16, 28, 24, 34, 30, 40], w = 120, h = 42, max = 40;
  const d = pts.map((p, i) => `${(i / (pts.length - 1)) * w},${h - (p / max) * h}`);
  const hrs = useCountUp(42, 1300);
  return (
    <div className="mt-auto">
      <p className="text-3xl font-bold text-app tnum">{hrs}<span className="text-base font-medium text-faint">h</span></p>
      <svg viewBox={`0 0 ${w} ${h}`} className="mt-1 h-10 w-full" aria-hidden="true">
        <polyline points={d.join(" ")} fill="none" stroke="var(--accent)" strokeWidth="2" />
        <circle cx={w} cy={h - (pts[pts.length - 1] / max) * h} r="3" fill="var(--accent)" />
      </svg>
    </div>
  );
}

function CtaBody() {
  return (
    <div className="flex h-full flex-col justify-between">
      <p className="text-xl font-bold leading-tight text-app">Avvia il<br />tuo OS</p>
      <a href="#" className="btn-primary mt-3 inline-flex w-max items-center gap-1.5 rounded-lg px-3.5 py-2 text-sm font-medium">Inizia ora <IArrowUR className="h-4 w-4" /></a>
    </div>
  );
}

/* ───────── definizioni tile + board ───────── */
const DEFS = {
  hero:      { label: "universal student os · v2.0", span: "sm:col-span-2 lg:col-span-2 lg:row-span-2 min-h-[280px]", Body: HeroBody },
  clock:     { label: "ora locale", span: "", Body: ClockBody },
  status:    { label: "sistema · 2.0.30", span: "", Body: StatusBody },
  media:     { label: "carriera · libretto", span: "sm:col-span-2 lg:col-span-2", Body: MediaBody },
  countdown: { label: "prossimo appello", span: "", Body: CountdownBody },
  focus:     { label: "focus · pomodoro", span: "", Body: FocusBody },
  timetable: { label: "oggi · orario unificato", span: "sm:col-span-2 lg:col-span-2 lg:row-span-2", Body: TimetableBody },
  ai:        { label: "assistente ai", span: "sm:col-span-2 lg:col-span-2", Body: AiBody },
  universal: { label: "adapter engine", span: "sm:col-span-2 lg:col-span-2", Body: UniversalBody },
  spark:     { label: "ore di studio · 7 giorni", span: "", Body: SparkBody },
  cta:       { label: "inizia", span: "", Body: CtaBody },
};
const DEFAULT_ORDER = ["hero", "clock", "status", "media", "countdown", "focus", "timetable", "ai", "universal", "spark", "cta"];

function Tile({ id, dnd }) {
  const def = DEFS[id];
  const Body = def.Body;
  return (
    <section
      className={"card group relative flex flex-col rounded-lg p-4 " + def.span + (dnd.over === id ? " over" : "") + (dnd.drag === id ? " dragging" : "")}
      onDragOver={(e) => { e.preventDefault(); dnd.setOver(id); }}
      onDragLeave={() => dnd.setOver((o) => (o === id ? null : o))}
      onDrop={(e) => { e.preventDefault(); dnd.drop(id); }}>
      <div className="mb-1 flex items-start justify-between gap-2">
        <span className="label">{def.label}</span>
        <button type="button" className="grip -m-1 p-1" draggable
          onDragStart={() => dnd.setDrag(id)} onDragEnd={() => { dnd.setDrag(null); dnd.setOver(null); }}
          onKeyDown={(e) => {
            if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); dnd.move(id, -1); }
            if (e.key === "ArrowRight" || e.key === "ArrowDown") { e.preventDefault(); dnd.move(id, 1); }
          }}
          aria-label={`Sposta «${def.label}». Trascina, oppure usa le frecce.`}>
          <IGrip className="h-4 w-4" />
        </button>
      </div>
      <div className="flex flex-1 flex-col"><Body /></div>
    </section>
  );
}

function TopBar({ dark, setDark }) {
  return (
    <header className="sticky top-0 z-50 border-b border-soft" style={{ background: "color-mix(in srgb, var(--bg) 85%, transparent)", backdropFilter: "blur(8px)" }}>
      <nav aria-label="Principale" className="mx-auto flex max-w-7xl items-center justify-between px-5 py-3">
        <a href="#" className="flex items-center gap-2.5">
          <span className="btn-primary flex h-7 w-7 items-center justify-center rounded-lg"><ICap className="h-4 w-4" /></span>
          <span className="text-[0.95rem] font-semibold tracking-tight text-app">Student OS</span>
        </a>
        <div className="hidden items-center gap-7 text-sm text-muted md:flex">
          <a href="#" className="hover:text-app">Moduli</a><a href="#" className="hover:text-app">Atenei</a><a href="#" className="hover:text-app">Docs</a>
        </div>
        <div className="flex items-center gap-2">
          <button type="button" onClick={() => setDark((d) => !d)} aria-label={dark ? "Tema chiaro" : "Tema scuro"}
            className="surface hoverable flex h-9 w-9 items-center justify-center rounded-lg border border-soft text-muted">
            {dark ? <ISun className="h-4 w-4" /> : <IMoon className="h-4 w-4" />}
          </button>
          <a href="#" className="btn-primary flex items-center gap-1.5 rounded-lg px-4 py-2 text-sm font-medium">Apri l'app <IArrowUR className="h-4 w-4" /></a>
        </div>
      </nav>
    </header>
  );
}

function App() {
  const [dark, setDark] = useState(() => store.get("sos.theme", false));
  const [order, setOrder] = useState(() => {
    const s = store.get("sos.order", DEFAULT_ORDER);
    return Array.isArray(s) && s.length === DEFAULT_ORDER.length ? s : DEFAULT_ORDER;
  });
  const [drag, setDrag] = useState(null), [over, setOver] = useState(null), [note, setNote] = useState("");

  useEffect(() => { document.documentElement.classList.toggle("dark", dark); store.set("sos.theme", dark); }, [dark]);
  useEffect(() => { store.set("sos.order", order); }, [order]);

  const drop = (target) => {
    setOrder((o) => { if (!drag || drag === target) return o; const a = [...o]; a.splice(a.indexOf(drag), 1); a.splice(a.indexOf(target), 0, drag); return a; });
    setDrag(null); setOver(null);
  };
  const move = (id, dir) => setOrder((o) => {
    const a = [...o], i = a.indexOf(id), j = i + dir; if (j < 0 || j >= a.length) return o;
    [a[i], a[j]] = [a[j], a[i]]; setNote(`«${DEFS[id].label}» spostato in posizione ${j + 1}`); return a;
  });
  const dnd = { drag, over, setDrag, setOver, drop, move };

  return (
    <div className="min-h-screen bg-app">
      <TopBar dark={dark} setDark={setDark} />
      <main className="mx-auto max-w-7xl px-5 py-9">
        <div className="mb-6 flex items-end justify-between">
          <div>
            <h2 className="text-xl font-semibold tracking-tight text-app">Dashboard</h2>
            <p className="mt-0.5 text-sm text-faint">Trascina la maniglia ⠿ per riordinare i moduli.</p>
          </div>
          <button type="button" onClick={() => { setOrder(DEFAULT_ORDER); setNote("Layout ripristinato"); }}
            className="surface hoverable rounded-lg border border-soft px-3 py-1.5 text-sm font-medium text-muted">Ripristina layout</button>
        </div>

        <section aria-label="Moduli" className="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:auto-rows-[182px] lg:grid-flow-row-dense lg:grid-cols-4">
          {order.map((id) => <Tile key={id} id={id} dnd={dnd} />)}
        </section>
        <p aria-live="polite" className="sr-only">{note}</p>
      </main>

      <footer className="border-t border-soft">
        <div className="mx-auto flex max-w-7xl flex-col items-center justify-between gap-2 px-5 py-6 text-sm text-faint sm:flex-row">
          <p>Student OS · pensato per ogni università</p>
          <p className="flex items-center gap-2"><span className="h-1.5 w-1.5 rounded-full bg-emerald-500" /> sistema operativo</p>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
